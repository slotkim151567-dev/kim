<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page - สมัคร/ล็อกอิน</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Prompt', sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      padding: 48px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      color: #2575fc;
      margin-bottom: 16px;
      font-weight: 700;
    }
    p {
      color: #444;
      margin-bottom: 32px;
      font-size: 1.1rem;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 0;
      margin-bottom: 16px;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-signup {
      background: linear-gradient(90deg, #2575fc 0%, #6a11cb 100%);
      color: #fff;
      margin-bottom: 12px;
    }
    .btn-signup:hover {
      background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
    }
    .btn-login {
      background: #fff;
      color: #2575fc;
      border: 2px solid #2575fc;
    }
    .btn-login:hover {
      background: #f0f6ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ยินดีต้อนรับ!</h1>
    <p>สมัครสมาชิกใหม่ หรือเข้าสู่ระบบเพื่อเริ่มต้นใช้งาน</p>
    <button class="btn btn-signup">สมัครสมาชิก</button>
    <button class="btn btn-login">เข้าสู่ระบบ</button>
  </div>
</body>
</html>
